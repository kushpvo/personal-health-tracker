services:
  app:
    build: .
    image: ghcr.io/kushpvo/personal-health-tracker:latest
    container_name: health-tracker
    ports:
      - "8080:8080"
    volumes:
      - health-tracker-data:/app/data
    environment:
      - PORT=8080
      - OCR_BACKEND=tesseract
      - MAX_UPLOAD_MB=50
      - DATA_DIR=/app/data
      - SECRET_KEY=change-me-in-production
      # Set ALLOWED_ORIGINS only if accessing the API from a different origin (e.g. dev mode).
      # Self-hosted single-origin deployments do not need this.
      # - ALLOWED_ORIGINS=https://yourdomain.com
    restart: unless-stopped

volumes:
  health-tracker-data:
